{% extends 'base.html' %}
{% block title %}Site Settings - Admin{% endblock %}
{% block body_class %}dashboard-body{% endblock %}
{% block content %}
<div class="dashboard-layout">
  {% include 'admin_panel/sidebar.html' %}
  <div class="dashboard-main">
    <div class="dashboard-topbar"><h4 class="mb-0">Site Settings</h4></div>
    <div class="p-4"><div class="row justify-content-center"><div class="col-lg-8">
      <div class="dash-card p-4">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label fw-semibold">Site Name</label><input type="text" name="site_name" class="form-control" value="{{ site.site_name }}"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Tagline</label><input type="text" name="tagline" class="form-control" value="{{ site.tagline }}"></div>
            <div class="col-12"><label class="form-label fw-semibold">Hero Title</label><input type="text" name="hero_title" class="form-control" value="{{ site.hero_title }}"></div>
            <div class="col-12"><label class="form-label fw-semibold">Hero Subtitle</label><textarea name="hero_subtitle" class="form-control" rows="2">{{ site.hero_subtitle }}</textarea></div>
            <div class="col-12"><label class="form-label fw-semibold">About Content</label><textarea name="about_content" class="form-control" rows="4">{{ site.about_content }}</textarea></div>
            <div class="col-md-4"><label class="form-label fw-semibold">Contact Email</label><input type="email" name="contact_email" class="form-control" value="{{ site.contact_email }}"></div>
            <div class="col-md-4"><label class="form-label fw-semibold">Contact Phone</label><input type="text" name="contact_phone" class="form-control" value="{{ site.contact_phone }}"></div>
            <div class="col-md-4"><label class="form-label fw-semibold">Logo</label><input type="file" name="logo" class="form-control" accept="image/*"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Facebook URL</label><input type="url" name="facebook_url" class="form-control" value="{{ site.facebook_url }}"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Twitter URL</label><input type="url" name="twitter_url" class="form-control" value="{{ site.twitter_url }}"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">LinkedIn URL</label><input type="url" name="linkedin_url" class="form-control" value="{{ site.linkedin_url }}"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">YouTube URL</label><input type="url" name="youtube_url" class="form-control" value="{{ site.youtube_url }}"></div>
          </div>
          <button type="submit" class="btn btn-primary mt-4 px-5"><i class="bi bi-save me-2"></i>Save Settings</button>
        </form>
      </div>
    </div></div></div>
  </div>
</div>
{% endblock %}
