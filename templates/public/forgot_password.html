{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
      <div class="col-lg-4">
        <div class="auth-card">
          <div class="auth-header text-center mb-4">
            <div class="auth-icon"><i class="bi bi-key-fill"></i></div>
            <h2 class="auth-title">Forgot Password</h2>
            <p class="text-muted">Enter your email and we'll send a reset link</p>
          </div>
          <form method="post">
            {% csrf_token %}
            <div class="mb-4">
              <label class="form-label">Email Address</label>
              <input type="email" name="email" class="form-control form-control-lg" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">Send Reset Link</button>
          </form>
          <p class="text-center mt-3"><a href="{% url 'login' %}" class="text-primary">Back to Login</a></p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
