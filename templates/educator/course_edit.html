{% extends 'base.html' %}
{% block title %}Edit Course - Educator{% endblock %}
{% block body_class %}dashboard-body{% endblock %}
{% block content %}
<div class="dashboard-layout">
  {% include 'educator/sidebar.html' %}
  <div class="dashboard-main">
    <div class="dashboard-topbar">
      <h4 class="mb-0">Edit Course</h4>
      <a href="{% url 'course_detail_educator' course.pk %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back to Course</a>
    </div>
    <div class="p-4"><div class="row justify-content-center"><div class="col-lg-8">
      <div class="dash-card p-4">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-3"><label class="form-label fw-semibold">Course Title *</label><input type="text" name="title" class="form-control" value="{{ course.title }}" required></div>
          <div class="mb-3"><label class="form-label fw-semibold">Description *</label><textarea name="description" class="form-control" rows="5" required>{{ course.description }}</textarea></div>
          <div class="row g-3 mb-3">
            <div class="col-md-6"><label class="form-label fw-semibold">Price (₹)</label><input type="number" step="0.01" name="price" class="form-control" value="{{ course.price }}"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Duration (Hours)</label><input type="number" name="duration_hours" class="form-control" value="{{ course.duration_hours }}"></div>
            <div class="col-12">
              <label class="form-label fw-semibold">Thumbnail Image</label>
              {% if course.thumbnail %}<div class="mb-2"><img src="{{ course.thumbnail.url }}" width="100" class="rounded"></div>{% endif %}
              <input type="file" name="thumbnail" class="form-control" accept="image/*">
            </div>
            <div class="col-md-6">
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" name="is_free" id="isFree" {% if course.is_free %}checked{% endif %}>
                <label class="form-check-label fw-semibold" for="isFree">Make this course FREE</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" name="is_published" id="isPublished" {% if course.is_published %}checked{% endif %}>
                <label class="form-check-label fw-semibold text-success" for="isPublished">Publish Course (Make visible to students)</label>
              </div>
            </div>
          </div>
          <hr class="my-4">
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-2"></i>Save Changes</button>
            <a href="{% url 'course_detail_educator' course.pk %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div></div></div>
  </div>
</div>
{% endblock %}
