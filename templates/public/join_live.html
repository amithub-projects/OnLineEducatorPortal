{% extends 'base.html' %}
{% block title %}Join Live Class{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
      <div class="col-lg-4">
        <div class="auth-card text-center">
          <div class="auth-icon"><i class="bi bi-camera-video-fill"></i></div>
          <h2 class="auth-title">Join Live Class</h2>
          <p class="text-muted mb-4">Enter the room code shared by your educator</p>
          <form method="post">
            {% csrf_token %}
            <input type="text" name="room_code" class="form-control form-control-lg text-center mb-3" placeholder="e.g. ABC12345" maxlength="8" style="letter-spacing:6px;font-weight:700;text-transform:uppercase" required>
            <button type="submit" class="btn btn-primary w-100 btn-lg"><i class="bi bi-camera-video me-2"></i>Join Now</button>
          </form>
          {% if not user.is_authenticated %}
          <p class="mt-3 text-muted small"><a href="{% url 'login' %}" class="text-primary">Login</a> first for the best experience</p>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
